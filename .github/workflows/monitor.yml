name: fatsoma-monitor

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
    inputs:
      test:
        description: "Send a test notification with current availability"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: monitor
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # GitHub's cron floor is 5 minutes, so each job polls 3x ~100s apart
      # for an effective cadence of ~1.5-2 min. State is pushed after any
      # iteration that saw a change so a mid-job failure can't re-notify.
      - name: Run monitor
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          git config user.name "fatsoma-monitor[bot]"
          git config user.email "actions@users.noreply.github.com"
          commit_state() {
            git add state.json
            if ! git diff --cached --quiet; then
              git commit -m "update state"
              git pull --rebase origin main
              git push
            fi
          }
          if [ "${{ inputs.test }}" = "true" ]; then
            python monitor.py --test
            commit_state
          else
            for i in 1 2 3; do
              python monitor.py
              commit_state
              if [ "$i" -lt 3 ]; then sleep 100; fi
            done
          fi
