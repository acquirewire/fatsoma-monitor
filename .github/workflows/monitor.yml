name: fatsoma-monitor

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
    inputs:
      test:
        description: "Send a test notification with current availability"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: monitor
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run monitor
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ "${{ inputs.test }}" = "true" ]; then
            python monitor.py --test
          else
            python monitor.py
          fi

      - name: Commit state
        run: |
          git config user.name "fatsoma-monitor[bot]"
          git config user.email "actions@users.noreply.github.com"
          git add state.json
          if ! git diff --cached --quiet; then
            git commit -m "update state"
            git pull --rebase origin main
            git push
          fi
